name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Compile solver
        run: g++ -std=c++17 -O3 -fopenmp apps/solver_numerical.cpp -o apps/generate_phase_diagram.exe
      - name: Smoke test numerical mode
        run: ./apps/generate_phase_diagram.exe --numerical 0 10
      - name: Smoke test analytical mode
        run: ./apps/generate_phase_diagram.exe --analytical 0 10
